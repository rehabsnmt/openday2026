                        alt="Logo Bộ môn" 
                        className="w-10 h-10 object-contain"
                        onError={(e) => {
                          e.target.onerror = null;
                          e.target.src = "https://via.placeholder.com/40?text=Logo";
                        }}
                      />
                    </div>
                    <div>
                      <h2 className="text-2xl font-bold mb-2 text-gray-800">{majors[activeMajor].name}</h2>
                      <p className="text-gray-600 leading-relaxed mb-4 italic text-sm md:text-base">"{majors[activeMajor].description}"</p>
                      <div className="flex flex-wrap gap-4 text-sm">
                        <div className="flex items-center gap-1.5 bg-white px-3 py-1 rounded-full border shadow-sm">
                          <Clock className="w-4 h-4 text-gray-400" />
                          <span>Đào tạo: 4 năm (8 học kỳ)</span>
                        </div>
                        <div className="flex items-center gap-1.5 bg-white px-3 py-1 rounded-full border shadow-sm">
                          <Target className="w-4 h-4 text-gray-400" />
                          <span>Tổng khối lượng: 130 tín chỉ</span>
                        </div>
                      </div>
                    </div>
                  </div>

                  <div className="mt-6 w-full overflow-hidden rounded-xl border border-white shadow-sm relative bg-white/50 py-3 backdrop-blur-sm">
                    <div className="flex items-center gap-2 mb-3 px-3">
                       <ImageIcon className={`w-4 h-4 ${activeMajor === 'VLTL' ? 'text-blue-500' : activeMajor === 'HĐTL' ? 'text-orange-500' : 'text-emerald-500'}`} />
                       <span className="text-xs font-bold uppercase text-gray-500 tracking-wider">Hình ảnh hoạt động</span>
                    </div>
                    <div className="animate-scroll flex w-max">
                      {[...activeImages, ...activeImages].map((imgSrc, idx) => (
                        <div key={idx} className="pr-3 flex-shrink-0">
                          <img 
                            src={imgSrc} 
                            alt={`Hoạt động ${majors[activeMajor].name}`} 
                            className="h-36 md:h-48 w-56 md:w-72 object-cover rounded-lg shadow-sm border border-gray-200 bg-gray-100"
                            onError={(e) => {
                              e.target.onerror = null;
                              e.target.src = `https://via.placeholder.com/400x300?text=${majors[activeMajor].name}+${(idx % 5) + 1}`;
                            }}
                          />
                        </div>
                      ))}
                    </div>
                  </div>
                </section>

                <div className="space-y-4">
                  <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between mb-4 gap-2">
                    <h3 className="text-lg font-bold flex items-center gap-2">
                      <BookOpen className="w-5 h-5 text-blue-600" />
                      Khung Chương Trình Đào Tạo
                    </h3>
                    <span className="text-[10px] md:text-xs text-gray-500 bg-white border px-2 py-1 rounded-full italic shadow-sm">
                      *Nhấp vào tên học kỳ để xem danh sách môn học
                    </span>
                  </div>

                  {semesters.map((sem) => {
                    const subjects = curriculumDatabase[sem.key]?.filter(sub => !sub.tags || sub.tags.includes(activeMajor)) || [];
                    const isOpen = expandedSemester === sem.id;
                    
                    return (
                      <div 
                        key={sem.id} 
                        className={`bg-white rounded-xl border transition-all overflow-hidden ${
                          isOpen ? `ring-2 ${getBorderClass(majors[activeMajor].color)} shadow-md` : 'hover:border-gray-300 shadow-sm'
                        }`}
                      >
                        <button 
                          onClick={() => setExpandedSemester(isOpen ? null : sem.id)}
                          className="w-full px-5 py-4 flex items-center justify-between text-left"
                        >
                          <div className="flex items-center gap-3">
                            <div className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-bold ${
                              isOpen ? getColorClass(majors[activeMajor].color) : 'bg-gray-100 text-gray-500'
                            }`}>
                              {sem.id}
                            </div>
                            <span className={`font-semibold ${isOpen ? 'text-gray-900' : 'text-gray-600'}`}>{sem.title}</span>
                          </div>
                          <ChevronRight className={`w-5 h-5 text-gray-400 transition-transform ${isOpen ? 'rotate-90' : ''}`} />
                        </button>

                        {isOpen && (
                          <div className="px-5 pb-5 animate-in fade-in slide-in-from-top-2 duration-300">
                            <div className="overflow-x-auto">
                              <table className="w-full text-sm">
                                <thead>
                                  <tr className="text-gray-400 border-b text-left">
                                    <th className="py-2 font-medium w-12">STT</th>
                                    <th className="py-2 font-medium">Tên học phần đầy đủ</th>
                                    <th className="py-2 font-medium text-center">Tín chỉ (LT+TH)</th>
                                  </tr>
                                </thead>
                                <tbody className="divide-y">
                                  {subjects.map((sub, idx) => {
                                    const totalCredits = sub.theory + sub.practice;
                                    return (
                                      <tr key={sub.id} className="group hover:bg-gray-50 transition-colors">
                                        <td className="py-3 text-gray-400">{idx + 1}</td>
                                        <td className="py-3 font-medium text-gray-800">{sub.name}</td>
                                        <td className="py-3 text-center text-gray-600">
                                          <span className="font-bold">{totalCredits}</span>
                                          <span className="text-gray-400 text-xs ml-1">({sub.theory} + {sub.practice})</span>
                                        </td>
                                      </tr>
                                    );
                                  })}
                                </tbody>
                              </table>
                            </div>
                            
                            <div className={`mt-4 p-3 rounded-lg flex flex-col sm:flex-row items-center justify-between text-xs gap-2 ${getLightBgClass(majors[activeMajor].color)}`}>
                               <div className="flex items-center gap-1.5 text-gray-700">
                                 <Info className="w-4 h-4" />
                                 <span>Tổng: <strong>{subjects.reduce((acc, curr) => acc + curr.theory + curr.practice, 0)}</strong> tín chỉ cho học kỳ này.</span>
                               </div>
                               <div className="text-gray-400 italic">
                                 *Dựa trên khung chương trình đào tạo năm học 2025
                               </div>
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </main>

              <footer className="max-w-4xl mx-auto px-4 mt-12 text-center border-t pt-8 pb-12">
                <p className="text-gray-500 text-sm mb-1 font-medium uppercase tracking-wider">Chọn ngành để tìm hiểu lộ trình</p>
                <p className="text-[11px] text-blue-600 italic mb-5">* Sinh viên được chọn 1 trong 3 lựa chọn</p>
                
                <div className="grid grid-cols-3 gap-1.5 md:gap-3 w-full max-w-2xl mx-auto">
                  {Object.keys(majors).map(key => (
                    <button
                      key={key}
                      onClick={() => {
                        setActiveMajor(key);
                        setExpandedSemester(null);
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                      }}
                      className={`flex items-center justify-center px-1 py-2 md:px-5 md:py-2.5 rounded-xl md:rounded-2xl border-2 transition-all active:scale-95 text-[10px] sm:text-xs md:text-sm shadow-sm font-semibold text-center leading-tight ${
                        activeMajor === key 
                          ? `${getBorderClass(majors[key].color)} ${getLightBgClass(majors[key].color)} text-gray-900 shadow-md md:scale-105`
                          : 'bg-white border-gray-100 text-gray-500 hover:text-gray-700 hover:bg-gray-50'
                      }`}
                    >
                      {majors[key].name}
                    </button>
                  ))}
                </div>
                <div className="mt-12 flex flex-col items-center gap-4">
                  <img src="logo_Bộ môn.png" alt="Logo Bộ môn" className="h-20 opacity-90 drop-shadow-sm" />
                  <div className="text-[10px] md:text-xs text-gray-400 max-w-md leading-relaxed">
                    Bản quyền © 2026 Bộ môn Phục hồi chức năng. Mọi quyền được bảo lưu.
                  </div>
                </div>
              </footer>
            </div>
          );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <style>
      .hide-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .hide-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      
      @keyframes scroll {
        0% { transform: translateX(0); }
        100% { transform: translateX(-50%); } 
      }
      
      .animate-scroll {
        animation: scroll 25s linear infinite;
      }
      
      .animate-scroll:hover, 
      .animate-scroll:active {
        animation-play-state: paused;
      }
    </style>
</body>
</html>
