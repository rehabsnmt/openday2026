                              </table>
                            </div>
                            
                            <div className={`mt-4 p-3 rounded-lg flex flex-col sm:flex-row items-center justify-between text-xs gap-2 ${getLightBgClass(majors[activeMajor].color)}`}>
                               <div className="flex items-center gap-1.5 text-gray-700">
                                 <Info className="w-4 h-4" />
                                 <span>Tổng: <strong>{subjects.reduce((acc, curr) => acc + curr.theory + curr.practice, 0)}</strong> tín chỉ cho học kỳ này.</span>
                               </div>
                               <div className="text-gray-400 italic">
                                 *Dựa trên khung chương trình đào tạo năm học 2025
                               </div>
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              </main>

              <footer className="max-w-4xl mx-auto px-4 mt-12 text-center border-t pt-8 pb-12">
                <p className="text-gray-500 text-sm mb-4 font-medium uppercase tracking-wider">Chọn ngành học để tìm hiểu lộ trình</p>
                <div className="flex flex-wrap justify-center gap-3">
                  {Object.keys(majors).map(key => (
                    <button
                      key={key}
                      onClick={() => {
                        setActiveMajor(key);
                        setExpandedSemester(1);
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                      }}
                      className={`flex items-center gap-2 px-6 py-3 rounded-2xl border-2 transition-all hover:scale-105 active:scale-95 text-sm shadow-sm ${
                        activeMajor === key 
                          ? `${getBorderClass(majors[key].color)} ${getLightBgClass(majors[key].color)} font-bold text-gray-900`
                          : 'bg-white border-gray-100 text-gray-400'
                      }`}
                    >
                      {majors[key].name}
                    </button>
                  ))}
                </div>
                <div className="mt-12 flex flex-col items-center gap-4">
                  <img src="logo_Bộ môn.png" alt="Logo Bộ môn" className="h-20 opacity-90 drop-shadow-sm" />
                  <div className="text-[10px] md:text-xs text-gray-400 max-w-md leading-relaxed">
                    © Bản quyền 2026 Bộ môn Phục hồi chức năng, Trường Điều dưỡng - Kỹ thuật y học, Đại học Y Dược Thành Phố Hồ Chí Minh. Mọi quyền được bảo lưu.
                  </div>
                </div>
              </footer>
            </div>
          );
        };

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
